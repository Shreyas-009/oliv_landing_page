<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oliv Landing Page</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div id="nav-left">
            <div id="logo">
                <img src="./logo.png" alt="logo">
            </div>
            <button id="nav-left-btn">We are hiring!</button>
        </div>

        <button id="menu">
            <i class="ri-menu-3-line"></i>
        </button>
        <div id="nav-right">
            <button id="menu-close">
                <i class="ri-close-line"></i>
            </button>
            <ul id="nav-links">
                <li>Work</li>
                <li>Services</li>
                <li>About</li>
                <li>Blog</li>
                <li id="nav-dropdown">
                    <span>
                        Pages
                    </span>
                    <i class="ri-arrow-down-s-line"></i>
                </li>
            </ul>
            <button id="cart-btn">Cart <span id="count">0</span></button>
            <button id="nav-right-btn">Get in Touch</button>
        </div>
    </nav>
    <main>
        <section id="hero-section">
            <h1>Building Brands, One <br>
            Success Story at a Time.</h1>
            <p>
                Create a Brand That Resonates: We Can Help You
                Define and Communicate Your Unique Message.
            </p>
            <button id="services-btn">
                Our Services
            </button>
        </section>

    <section id="brands-section">
    
        <div class="brands-track">
            <div class="container">
                <img src="./brands/brand1.png">
                <img src="./brands/brand2.png">
                <img src="./brands/brand3.png">
                <img src="./brands/brand4.png">
                <img src="./brands/brand5.png">
                <img src="./brands/brand6.png">
            </div> 
            <div class="container">
                <img src="./brands/brand1.png">
                <img src="./brands/brand2.png">
                <img src="./brands/brand3.png">
                <img src="./brands/brand4.png">
                <img src="./brands/brand5.png">
                <img src="./brands/brand6.png">
            </div>
        </div>
    
    </section>
    </main>
</body>
</html>
